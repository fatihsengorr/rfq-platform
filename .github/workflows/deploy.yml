name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
  LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api prisma generate
      - run: pnpm lint
      - run: pnpm --filter api build
      - run: pnpm --filter web build
      - run: pnpm test

  deploy:
    name: Deploy to Lightsail
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd ~/rfq-platform
            git pull origin main
            # BuildKit is required for --mount=type=cache in our Dockerfiles.
            # Without it, the pnpm store and TS incremental caches are ignored
            # and every build reinstalls everything from scratch.
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose --env-file deploy/lightsail/.env.prod -f docker-compose.yml -f docker-compose.prod.yml build
            docker compose --env-file deploy/lightsail/.env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker compose --env-file deploy/lightsail/.env.prod -f docker-compose.yml -f docker-compose.prod.yml exec api sh -c "pnpm prisma migrate deploy" || true
            docker image prune -f
